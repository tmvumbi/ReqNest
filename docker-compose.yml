services:
  postgres:
    image: postgres:18.4-alpine
    container_name: reqnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reqnest}
      POSTGRES_USER: ${POSTGRES_USER:-reqnest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reqnest_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - reqnest_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: reqnest-azurite
    restart: unless-stopped
    command: >-
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --skipApiVersionCheck
      --location /data
      --debug /data/debug.log
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
      - "${AZURITE_QUEUE_PORT:-10001}:10001"
      - "${AZURITE_TABLE_PORT:-10002}:10002"
    volumes:
      - reqnest_azurite_data:/data

volumes:
  reqnest_postgres_data:
  reqnest_azurite_data:
